<svg viewBox="0 0 220 210" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>TriArk logo</title>

  <!-- 三つの弧（陸海空） -->
  <path d="M10,150 A100,100 0 0,1 210,150" fill="none" stroke="#FF8C42" stroke-width="10" stroke-linecap="round"/>
  <path d="M30,150 A80,80 0 0,1 190,150" fill="none" stroke="#00B4C8" stroke-width="10" stroke-linecap="round"/>
  <path d="M50,150 A60,60 0 0,1 170,150" fill="none" stroke="#1A2E3A" stroke-width="10" stroke-linecap="round"/>

  <!-- T 縦幹 -->
  <rect x="103" y="18" width="12" height="134" fill="#1A2E3A" rx="3"/>
  <!-- T 横木 -->
  <rect x="55" y="18" width="108" height="10" fill="#1A2E3A" rx="3"/>

  <!-- ワードマーク -->
  <text x="109" y="190" font-family="Georgia, serif" font-size="22" font-weight="bold" letter-spacing="5" text-anchor="middle" fill="#1A2E3A">TriArk</text>
  <rect x="55" y="196" width="108" height="2" rx="1" fill="#00B4C8"/>
</svg>
